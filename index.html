<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Love Card</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Segoe UI', sans-serif;
    }

    body {
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(135deg, #ff9a9e, #fad0c4, #fad0c4);
      overflow: hidden;
    }

    .card {
      width: 340px;
      background: rgba(255,255,255,0.15);
      backdrop-filter: blur(15px);
      border: 1px solid rgba(255,255,255,0.3);
      border-radius: 28px;
      padding: 30px 25px;
      text-align: center;
      color: white;
      box-shadow: 0 20px 40px rgba(0,0,0,0.2);
      animation: float 4s ease-in-out infinite;
      position: relative;
    }

    .heart {
      font-size: 60px;
      animation: pulse 1.5s infinite;
      margin-bottom: 15px;
    }

    h1 {
      font-size: 2rem;
      margin-bottom: 10px;
      text-shadow: 0 2px 10px rgba(0,0,0,0.2);
    }

    .message {
      font-size: 1rem;
      line-height: 1.7;
      margin-top: 15px;
      color: #fff;
    }

    .signature {
      margin-top: 25px;
      font-size: 1.1rem;
      font-weight: bold;
      color: #ffe4ec;
    }

    .floating-heart {
      position: absolute;
      color: rgba(255,255,255,0.7);
      animation: rise 8s linear infinite;
      font-size: 20px;
    }

    .floating-heart:nth-child(1) { left: 10%; animation-delay: 0s; }
    .floating-heart:nth-child(2) { left: 30%; animation-delay: 2s; }
    .floating-heart:nth-child(3) { left: 60%; animation-delay: 4s; }
    .floating-heart:nth-child(4) { left: 80%; animation-delay: 6s; }

    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.15); }
    }

    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
    }

    @keyframes rise {
      0% {
        transform: translateY(100vh) scale(0.8);
        opacity: 0;
      }
      20% { opacity: 1; }
      100% {
        transform: translateY(-120px) scale(1.3);
        opacity: 0;
      }
    }
  </style>
</head>
<body>
  <div class="floating-heart">❤</div>
  <div class="floating-heart">❤</div>
  <div class="floating-heart">❤</div>
  <div class="floating-heart">❤</div>

  <div class="card">
    <div class="heart">❤️</div>
    <h1>For My Love</h1>

    <div class="message">
      Dear SurajMukhi,<br><br>
      Every moment with you feels like a beautiful dream. 
      Your smile makes my world brighter, and your love makes my life complete. 
      No matter what happens, I will always be there for you. 💖(Pls maaf kar do surajmukhi🌻)
    </div>

    <div class="signature">
      Forever Yours,<br>
      Deep
    </div>
  </div>
</body>
</html>
